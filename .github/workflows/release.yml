name: Release APK

# Builds a SIGNED release APK and publishes it as a GitHub Release.
# Trigger: push a tag matching v* (e.g.  git tag v1.0.0 && git push --tags).
#
# Requires these repo secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64     base64 of a PKCS12 keystore
#   KEYSTORE_PASSWORD   keystore password
#   KEY_ALIAS           key alias
#   KEY_PASSWORD        key password
# Without them the job fails fast with a clear message.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail fast if signing secrets are missing
        run: |
          missing=""
          test -n "$KEYSTORE_BASE64"   || missing="$missing KEYSTORE_BASE64"
          test -n "$KEYSTORE_PASSWORD" || missing="$missing KEYSTORE_PASSWORD"
          test -n "$KEY_ALIAS"         || missing="$missing KEY_ALIAS"
          test -n "$KEY_PASSWORD"      || missing="$missing KEY_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::error::Missing signing secrets:$missing"
            echo "Set them at Settings -> Secrets and variables -> Actions."
            exit 1
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Decode signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore

      - name: Build release APK
        uses: gradle/gradle-build-action@v3
        env:
          HERMES_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          HERMES_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          HERMES_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          HERMES_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        with:
          gradle-version: 8.9
          arguments: assembleRelease --no-daemon

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
